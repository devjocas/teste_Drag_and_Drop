<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste basico de drag and drop</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    .container-principal{
        background:red;
        width: 100%;
        height: 100vh;
        display: grid;
        align-items: center;
        justify-content: center;

    }
    #html{
        background:green;
        width: 100%;
        height: 20px;
        padding: 10px;
        cursor: grab;
        text-align: center;
    }
    #caixa-grande{
        background:#605c5c;
        width: 500px;
        height: 250px;
        padding: 30px;
        border: 2px dashed white;

        display: grid;
        place-items: center;
    }

</style>
<body>
    <div class="container-principal">
        <div draggable="true" id="html">HTML</div>
        <div draggable="true" id="caixa-grande"></div>
    </div>

    <script>
        const html = document.getElementById('html')
        const caixaGrande = document.getElementById('caixa-grande')
        //Inicializar o arrastamento (dragstart)
        html.addEventListener('dragstart', event=>{
            event.dataTransfer.setData('text/plain', event.target.id)
            event.dataTransfer.effectAllowed = 'copyMove'
        })
        //Inicializar o drop apartir do dragover
        caixaGrande.addEventListener('dragover', event=>{
            event.preventDefault()
            event.dataTransfer.dropEffect ='copy'
        })
        //Realizar a soltura 
       caixaGrande.addEventListener('drop', event=>{
            event.preventDefault()
            const id = event.dataTransfer.getData('text/plain')
            const selecionar = document.getElementById(id)
            caixaGrande.appendChild(selecionar)
        })
        //Finalizar a manipulação da API drag and drop
        caixaGrande.addEventListener('dragend', ()=>{
            alert('Elemnto inserido!')
        })
    </script>
</body>
</html>

<!-- Exemplo-2 de arrastar imagem fantasma -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Drag Image</title>
  <style>
    #dragMe {
      width: 100px; height: 100px;
      background: teal; color: white;
      text-align: center; line-height: 100px;
      cursor: grab;
    }
    #dropTarget {
      margin-top: 20px;
      width: 250px; height: 120px;
      border: 2px dashed gray;
      text-align: center; padding-top: 40px;
    }
  </style>
</head>
<body>
  <h3>Custom ghost image while dragging</h3>
  <div id="dragMe" draggable="true">Drag me</div>
  <div id="dropTarget">Drop here</div>

  <script>
    const dragMe = document.getElementById("dragMe");
    const dropTarget = document.getElementById("dropTarget");

    dragMe.addEventListener("dragstart", (e) => {
      const ghost = document.createElement("div");
      ghost.style.width = "80px";
      ghost.style.height = "80px";
      ghost.style.background = "orange";
      ghost.style.borderRadius = "50%";
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 40, 40);
      setTimeout(() => ghost.remove(), 0);
    });

    dropTarget.addEventListener("dragover", (e) => e.preventDefault());
    dropTarget.addEventListener("drop", (e) => {
      e.preventDefault();
      dropTarget.textContent = "Dropped with custom ghost!";
    });
  </script>
</body>
</html>

<!-- Exemplo 3: Lista Ordenável (Reordenar Itens)  -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sortable List</title>
  <style>
    ul { list-style: none; padding: 0; }
    li {
      padding: 10px; margin: 5px;
      background: lightblue;
      cursor: move;
    }
  </style>
</head>
<body>
  <h3>Reorder the items by dragging</h3>
  <ul id="sortable">
    <li draggable="true">Item 1</li>
    <li draggable="true">Item 2</li>
    <li draggable="true">Item 3</li>
    <li draggable="true">Item 4</li>
  </ul>

  <script>
    const sortable = document.getElementById("sortable");
    let draggedItem = null;

    sortable.addEventListener("dragstart", (e) => {
      draggedItem = e.target;
    });

    sortable.addEventListener("dragover", (e) => {
      e.preventDefault();
      const target = e.target;
      if (target.tagName === "LI" && target !== draggedItem) {
        const rect = target.getBoundingClientRect();
        const next = (e.clientY - rect.top) / (rect.height) > 0.5;
        sortable.insertBefore(draggedItem, next ? target.nextSibling : target);
      }
    });
  </script>
</body>
</html>
