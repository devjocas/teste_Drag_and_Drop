<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Simples</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .container-principal{
        width: 100%;
        height: 100vh;
        padding: 20px;
        background: rgba(91, 5, 37, 0.733);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .left, .right{
        width: 300px;
        min-height: 400px;
        margin: 20px;
        border: 2px dashed #fff;
        padding: 20px;
        cursor: grab;
        display: flex;
        
    }
    .left img{
        width: 120px;
        height: 120px;
        border-radius: 50%;
        margin: 10px;
        display: flex;
        margin-left: 20px;
        margin-top: 100px;
    }
    .right img{
        width: 120px;
        height: 120px;
        border-radius: 50%;
        margin: 10px;
        display: flex;
        margin-left: 120px;
        margin-top: 100px;
    }
    .destaque{
        background:#5d1820;
    }
  
</style>
<body>
    <div class="container-principal">
        <div class="left" id="left">
            <img src="logotipos/minha_foto.png" id="img1" alt="foto" draggable="true">
            <!-- <img src="logotipos/IMABQ3nCbU9hc.png" id="img2" alt="foto" draggable="true"> -->
        </div>

        <div class="right" id="right" draggable="true"></div>
    </div>

    <script>
        let imagem = document.getElementById('img1')
        let right = document.getElementById('right')
        let draggableE = null;

       imagem.addEventListener('dragstart', e=>{
        draggableE =e.target;
        e.dataTransfer.effectAllowed = 'copyMove';
        e.dataTransfer.setData('text/plain', 'imagem');
        
       });

       right.addEventListener('dragover', e=>{
        e.preventDefault(); //obrigatorio
        e.dataTransfer.dropEffect = 'move'
       
       });

       right.addEventListener('drop', e=>{
        e.preventDefault();
        right.classList.add('destaque')
        if(!draggableE) return;

        // Mover o elemento original

        right.innerHTML = '';
        right.appendChild(draggableE)
        draggableE = null
       })
    </script>
</body>
</html>
